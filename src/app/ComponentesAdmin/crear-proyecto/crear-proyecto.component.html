<form [formGroup]="formulario" (ngSubmit)="subirProyecto()" class="form-proyecto">
    <h1>Nuevo Proyecto</h1>
    
    <div class="texto" style="width: 100%;">
        <div class="contenido">
            <label>Título del proyecto</label>
            <input formControlName="titulo" type="text" placeholder="Ej: Identidad Visual Malharro">
        </div>
        
        <div class="contenido">
            <label>Descripción</label>
            <textarea formControlName="descripcion" placeholder="Cuenta de qué trata el proyecto..."></textarea>
        </div>
    </div>

    <label>Galería de imágenes</label>
    <ngx-dropzone (change)="onSelect($event)" accept="image/*">
        <ngx-dropzone-label>
            <div class="upload-icon">📁</div>
            Arrastra tus imágenes aquí o haz clic para buscar.
            <br><small>La primer imagen sera la portada.</small>
        </ngx-dropzone-label>
    </ngx-dropzone>

    <div class="image-preview-container" *ngIf="files.length > 0">
        <div *ngFor="let f of files; let i = index" class="preview-card">
            <ngx-dropzone-image-preview [file]="f" [removable]="true" (removed)="onRemove(f)">
                <ngx-dropzone-label>
                    <span *ngIf="i === 0" class="badge-principal">Portada</span>
                </ngx-dropzone-label>
            </ngx-dropzone-image-preview>
        </div>
    </div>

    <button type="submit" class="btn" [disabled]="formulario.invalid || files.length === 0 || cargando">
        @if (!cargando) {
            <span>Crear Proyecto</span>
        }
    @if (cargando) {
 <div class="spinner"></div>
    }
</button>
</form>

<app-modal [title]="'Operación exitosa'" #modalSucces [type]="'success'"></app-modal>
<app-modal #modalError [type]="'error'"></app-modal>
