<app-nav-bar></app-nav-bar>

<main>
  <h1 class="sr-only">Ignacio Yañez — Diseño Gráfico e Ilustración</h1>

  <div class="presentacion-hero">
      <img src="/img/fondo1.jpeg" alt="Trabajos destacados de diseño e ilustración de Ignacio Yañez" class="portada-imagen">
  </div>

  <section id="proyectos" class="proyectos" aria-labelledby="proyectos-heading">
    <div class="container">
       <h2 id="proyectos-heading">Proyectos</h2>

      <ul class="grid-proyectos">
    @for (item of listaproyectos; track $index) {
      <li class="carta-proyecto">
       <a class="carta-proyecto-link" [routerLink]="['/proyecto', item.id]">
       <div class="img-container">
    <picture>
      <source
        media="(max-width: 768px)"
        [srcset]="item.imagenPrincipalMobile | cloudinaryOptimize:800:1200">

      <img
        [src]="item.imagenPrincipal | cloudinaryOptimize:2000:2000"
        [alt]="item.titulo"
        class="portada-imagen-grid">
    </picture>

    <div class="titulo-overlay" aria-hidden="true">{{ item.titulo }}</div>
  </div>
       </a>
      </li>
    }
  </ul>
    </div>
  </section>

  <app-about-me></app-about-me>
</main>
