<section class="project-showcase">
  <div class="full-image">
    <img [src]="proyecto.imagenPrincipal" [alt]="proyecto.titulo" class="image">
  </div>

  <div class="gallery">
    @for (img of proyecto.listaImg; track img.url) {
      <div class="full-image">
        <img [src]="img.url" alt="detalle" class="image">
      </div>
    }
  </div>
</section>
